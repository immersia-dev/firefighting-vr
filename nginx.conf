# Shared config for both HTTP and HTTPS
upstream vision_backend {
    server backend:3000;
}

# HTTP — serves content directly (WebXR works on localhost without HTTPS)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/vision {
        proxy_pass         http://vision_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|glb|gltf|ico|svg|woff2?|ttf|json|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS — for non-localhost or Quest headset access
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    root /usr/share/nginx/html;
    index index.html;

    location /api/vision {
        proxy_pass         http://vision_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|glb|gltf|ico|svg|woff2?|ttf|json|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
